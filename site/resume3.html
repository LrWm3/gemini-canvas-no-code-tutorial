<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Marsman | Engineering Leader & Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --mars-primary: #ea580c;
            --mars-secondary: #f97316;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        .glass-nav {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Windows 95 Mode Styles */
        .theme-classic body { background-color: #008080 !important; color: black !important; }
        .win95-window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            box-shadow: none;
            color: black;
        }
        .win95-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            padding: 2px 4px;
        }
        .win95-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            padding: 2px 10px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #000 #fff #fff #000;
        }

        canvas#three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(234, 88, 12, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    <div id="root"></div>

    <script>
        const e = React.createElement;

        // --- THE DATA ---
        const EXPERIENCE = [
            {
                company: "ReelData AI",
                role: "Head of Software Engineering",
                period: "2021 - Present",
                desc: "Leading AI tech for land-based aquaculture. Scaling teams and systems.",
                details: ["Agile Leadership", "Jira Strategy", "Architectural Simplicity"]
            },
            {
                company: "MDA",
                role: "Software Architect / Staff Engineer",
                period: "2018 - 2021",
                desc: "Leading NATO command & control systems. Secret-level clearance architect.",
                details: ["TDD Specialist", "CI/CD Infrastructure", "Microservices Design"]
            },
            {
                company: "Current Studios",
                role: "Software Engineer",
                period: "2017 - 2018",
                desc: "Experimental AR/VR, Computer Vision, and high-performance UX.",
                details: ["OpenCV", "ARKit Floor Tracking", "Unity/Vive"]
            }
        ];

        // --- THE SHADERS ---
        const planetVertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const planetFragmentShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            uniform float uTime;
            uniform bool uClassic;

            void main() {
                if (uClassic) {
                    gl_FragColor = vec4(1.0, 1.0, 1.0, 0.1);
                } else {
                    float noise = sin(vUv.y * 10.0 + uTime) * 0.1;
                    vec3 color1 = vec3(0.92, 0.35, 0.07); // Orange
                    vec3 color2 = vec3(0.3, 0.1, 0.05);   // Dark Rust
                    float fresnel = pow(1.0 - dot(vNormal, vec3(0,0,1)), 3.0);
                    vec3 finalColor = mix(color2, color1, vUv.y + noise);
                    finalColor += fresnel * 0.5;
                    gl_FragColor = vec4(finalColor, 0.8);
                }
            }
        `;

        // --- COMPONENTS ---
        function ThreeBackground({ isClassic }) {
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                const canvas = document.getElementById('three-canvas');
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                // Planet
                const geometry = new THREE.SphereGeometry(2, 64, 64);
                const material = new THREE.ShaderMaterial({
                    vertexShader: planetVertexShader,
                    fragmentShader: planetFragmentShader,
                    uniforms: {
                        uTime: { value: 0 },
                        uClassic: { value: isClassic }
                    },
                    transparent: true
                });
                const planet = new THREE.Mesh(geometry, material);
                planet.position.x = 2;
                scene.add(planet);

                // Wireframe Grid (for Classic Mode)
                const gridGeo = new THREE.PlaneGeometry(20, 20, 20, 20);
                const gridMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 });
                const grid = new THREE.Mesh(gridGeo, gridMat);
                grid.rotation.x = Math.PI / 2.5;
                grid.position.y = -2;
                scene.add(grid);

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starCount = 1000;
                const starPos = new Float32Array(starCount * 3);
                for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 20;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 });
                const stars = new THREE.Points(starGeo, starMat);
                scene.add(stars);

                const animate = (time) => {
                    material.uniforms.uTime.value = time * 0.001;
                    material.uniforms.uClassic.value = isClassic;
                    
                    planet.rotation.y += isClassic ? 0.005 : 0.001;
                    planet.position.y = Math.sin(time * 0.001) * 0.2;
                    
                    grid.visible = isClassic;
                    grid.position.z = (time * 0.001 % 2) - 1;
                    
                    stars.rotation.y += 0.0005;
                    renderer.render(scene, camera);
                    requestAnimationFrame(animate);
                };

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);
                const animationId = requestAnimationFrame(animate);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationId);
                };
            }, [isClassic]);

            return null;
        }

        function App() {
            const [isClassic, setIsClassic] = React.useState(false);
            const [view, setView] = React.useState('home');

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                document.documentElement.className = isClassic ? 'theme-classic' : '';
            }, [isClassic, view]);

            const Nav = () => e('nav', { className: isClassic ? 'win95-window fixed top-0 w-full z-50 p-1' : 'fixed top-0 w-full z-50 glass-nav' },
                isClassic && e('div', { className: 'win95-title flex justify-between' }, e('span', null, 'MARSMAN.EXE'), e('span', null, 'X')),
                e('div', { className: 'max-w-7xl mx-auto px-6 h-16 flex items-center justify-between' },
                    e('div', { className: 'flex items-center space-x-2' },
                        e('div', { className: `w-8 h-8 rounded ${isClassic ? 'win95-window' : 'bg-orange-600'}` }),
                        e('span', { className: `font-bold tracking-tighter text-xl ${isClassic ? 'text-black' : 'text-white'}` }, 'MARSMAN')
                    ),
                    e('div', { className: 'flex items-center space-x-6' },
                        e('button', { onClick: () => setView('home'), className: isClassic ? 'win95-btn' : 'hover:text-orange-500' }, 'CORE'),
                        e('button', { onClick: () => setView('blog'), className: isClassic ? 'win95-btn' : 'hover:text-orange-500' }, 'LOGS'),
                        e('button', { onClick: () => setIsClassic(!isClassic), className: isClassic ? 'win95-btn bg-yellow-100' : 'px-4 py-1 rounded-full border border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white transition' }, 
                            isClassic ? 'Vaporize' : 'Go Classic'
                        )
                    )
                )
            );

            const Hero = () => e('section', { className: 'min-h-screen flex items-center px-6' },
                e('div', { className: `max-w-4xl ${isClassic ? 'win95-window p-8' : ''}` },
                    isClassic && e('div', { className: 'win95-title mb-4' }, 'SYSTEM_STATUS'),
                    e('h1', { className: `text-6xl md:text-8xl font-extrabold mb-6 leading-none ${isClassic ? 'text-black' : 'glow-text text-white'}` }, 
                        'DESIGNING THE ', e('br'), e('span', { className: isClassic ? '' : 'text-orange-600' }, 'FUTURE.')
                    ),
                    e('p', { className: `text-xl max-w-xl mb-8 ${isClassic ? 'text-black' : 'text-slate-400'}` }, 
                        'Head of Software Engineering at ReelData AI. Expert in high-stakes C++, distributed architectures, and elite engineering leadership.'
                    ),
                    e('div', { className: 'flex space-x-4' },
                        e('button', { className: isClassic ? 'win95-btn' : 'px-8 py-4 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition transform hover:scale-105' }, 'View Experience'),
                        e('a', { href: 'mailto:wl991552@dal.ca', className: isClassic ? 'win95-btn' : 'px-8 py-4 border border-white/20 hover:bg-white/10 rounded-lg' }, 'Contact')
                    )
                )
            );

            const Experience = () => e('section', { className: 'py-20 px-6' },
                e('div', { className: 'max-w-5xl mx-auto' },
                    e('h2', { className: 'text-3xl font-bold mb-12 flex items-center' }, 
                        e('div', { className: 'h-[1px] flex-grow bg-white/10 mr-4' }),
                        'CHRONOLOGY'
                    ),
                    e('div', { className: 'grid gap-8' },
                        EXPERIENCE.map((exp, i) => e('div', { key: i, className: isClassic ? 'win95-window p-6' : 'p-8 rounded-2xl bg-white/5 border border-white/10 hover:border-orange-500/50 transition' },
                            isClassic && e('div', { className: 'win95-title mb-4' }, exp.company),
                            e('div', { className: 'flex justify-between items-start mb-4' },
                                e('div', null,
                                    e('h3', { className: 'text-2xl font-bold' }, exp.role),
                                    e('p', { className: isClassic ? 'font-bold' : 'text-orange-500' }, exp.company)
                                ),
                                e('span', { className: 'text-sm font-mono opacity-50' }, exp.period)
                            ),
                            e('p', { className: 'mb-6 opacity-80' }, exp.desc),
                            e('div', { className: 'flex flex-wrap gap-2' },
                                exp.details.map((tag, ti) => e('span', { key: ti, className: isClassic ? 'border border-black px-2' : 'px-3 py-1 bg-white/10 rounded-full text-xs' }, tag))
                            )
                        ))
                    )
                )
            );

            const Blog = () => e('section', { className: 'pt-32 pb-20 px-6 max-w-4xl mx-auto' },
                e('h2', { className: 'text-5xl font-bold mb-12' }, 'Technical Logs'),
                [1, 2, 3].map(i => e('div', { key: i, className: `mb-12 ${isClassic ? 'win95-window p-6' : 'border-b border-white/10 pb-12'}` },
                    isClassic && e('div', { className: 'win95-title mb-4' }, `LOG_00${i}.TXT`),
                    e('span', { className: 'text-orange-500 font-bold mb-2 block' }, 'ARCHITECTURE'),
                    e('h3', { className: 'text-3xl font-bold mb-4' }, 'Scaling AI Systems in Marine Environments'),
                    e('p', { className: 'text-lg opacity-60 mb-6' }, 'How we leverage C++ and edge computing to process real-time data for global aquaculture farms...'),
                    e('button', { className: isClassic ? 'win95-btn' : 'text-white underline font-bold' }, 'Read Transmission')
                ))
            );

            const Footer = () => e('footer', { className: 'p-12 text-center opacity-30 text-sm' },
                e('p', null, `© 2024 William Marsman. Built with React & Three.js. (Classic: ${isClassic})`)
            );

            return e('div', null,
                e(ThreeBackground, { isClassic }),
                e(Nav),
                view === 'home' ? e(React.Fragment, null, e(Hero), e(Experience)) : e(Blog),
                e(Footer)
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
